name: Publish specification site

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-specification-site
  cancel-in-progress: false

jobs:
  build:
    name: Build specification site
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fonts-font-awesome \
            graphviz \
            latexmk \
            librsvg2-bin \
            make \
            python3-pip \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-plain-generic \
            texlive-xetex \
            xfonts-75dpi \
            xfonts-base \
            xvfb

      - name: Install Python dependencies
        run: |
          python3 -m venv venv
          . venv/bin/activate
          python -m pip install --upgrade pip
          pip install \
            GitPython \
            sphinx \
            sphinxcontrib-svg2pdfconverter

      - name: Install Mermaid CLI with sandbox wrapper
        run: |
          npm install -g @mermaid-js/mermaid-cli

          REAL_MMDC="$(command -v mmdc)"
          echo "REAL_MMDC=${REAL_MMDC}" >> "${GITHUB_ENV}"

          npx puppeteer browsers install chrome-headless-shell@148.0.7778.97

          mkdir -p "${GITHUB_WORKSPACE}/.github/bin"
          cat > "${GITHUB_WORKSPACE}/.github/bin/puppeteer-config.json" <<'JSON'
          {
            "args": [
              "--no-sandbox",
              "--disable-setuid-sandbox"
            ]
          }
          JSON

          cat > "${GITHUB_WORKSPACE}/.github/bin/mmdc" <<'SH'
          #!/usr/bin/env sh
          exec "$REAL_MMDC" -p "$GITHUB_WORKSPACE/.github/bin/puppeteer-config.json" "$@"
          SH

          chmod +x "${GITHUB_WORKSPACE}/.github/bin/mmdc"
          echo "${GITHUB_WORKSPACE}/.github/bin" >> "${GITHUB_PATH}"

      - name: Install draw.io with sandbox wrapper
        run: |
          curl -fsSL -o /tmp/drawio.deb \
            https://github.com/jgraph/drawio-desktop/releases/download/v28.0.6/drawio-amd64-28.0.6.deb

          sudo apt-get install -y /tmp/drawio.deb

          REAL_DRAWIO="$(command -v drawio)"
          echo "REAL_DRAWIO=${REAL_DRAWIO}" >> "${GITHUB_ENV}"

          mkdir -p "${GITHUB_WORKSPACE}/.github/bin"
          cat > "${GITHUB_WORKSPACE}/.github/bin/drawio" <<'SH'
          #!/usr/bin/env sh
          exec "$REAL_DRAWIO" --no-sandbox "$@"
          SH

          chmod +x "${GITHUB_WORKSPACE}/.github/bin/drawio"
          echo "${GITHUB_WORKSPACE}/.github/bin" >> "${GITHUB_PATH}"

      - name: Collect published releases
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            if (!process.env.RUNNER_TEMP) {
              throw new Error("RUNNER_TEMP is required to write the release manifest");
            }
            const releaseManifest =
              `${process.env.RUNNER_TEMP}/published-releases.json`;
            const releases = await github.paginate(
              github.rest.repos.listReleases,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              },
            );
            const publishedReleases = releases
              .filter((release) => !release.draft)
              .map((release) => ({
                tag_name: release.tag_name,
                version: release.tag_name.replace(/^v/, ""),
                prerelease: release.prerelease,
                html_url: release.html_url,
                published_at: release.published_at || null,
              }));
            fs.writeFileSync(
              releaseManifest,
              JSON.stringify(publishedReleases, null, 2),
            );

      - name: Build latest specification
        run: |
          . venv/bin/activate
          xvfb-run -a make clean all

      - name: Stage specification site
        run: |
          test -d build/html
          test -s build/latex/geisaspecification.pdf

          rm -rf build/pages
          mkdir -p build/pages/latest
          mkdir -p build/pages/downloads
          mkdir -p build/pages/latest/downloads
          mkdir -p build/pages/assets

          cp -a build/html/. build/pages/latest/
          cp build/latex/geisaspecification.pdf build/pages/downloads/geisaspecification.pdf
          cp build/latex/geisaspecification.pdf build/pages/latest/downloads/geisaspecification.pdf

          test -s source/images/geisa-pyramid.svg
          cp source/images/geisa-pyramid.svg build/pages/assets/geisa-pyramid.svg

          . venv/bin/activate
          python .github/scripts/stage-spec-releases.py \
            --manifest "${RUNNER_TEMP}/published-releases.json" \
            --repo "${GITHUB_WORKSPACE}" \
            --pages-dir "${GITHUB_WORKSPACE}/build/pages" \
            --work-dir "${RUNNER_TEMP}/geisa-spec-release-worktrees"
          LATEST_BUILT_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python .github/scripts/render-spec-site-index.py \
            --manifest "${RUNNER_TEMP}/published-releases.json" \
            --latest-built-at "${LATEST_BUILT_AT}" \
            --output build/pages/index.html

          touch build/pages/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/pages

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
